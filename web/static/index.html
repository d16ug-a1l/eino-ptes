<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eino-PTES Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
        .header { background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 20px; color: #58a6ff; }
        .container { display: flex; height: calc(100vh - 60px); }
        .sidebar { width: 280px; background: #161b22; border-right: 1px solid #30363d; padding: 16px; overflow-y: auto; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .panel h2 { font-size: 14px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .worker-card { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
        .worker-card .name { font-weight: 600; color: #e6edf3; }
        .worker-card .status { font-size: 12px; margin-top: 4px; }
        .status-idle { color: #3fb950; }
        .status-busy { color: #f0883e; }
        .status-offline { color: #f85149; }
        .task-form { display: flex; gap: 8px; flex-wrap: wrap; }
        .task-form input, .task-form select { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; }
        .task-form button { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .task-form button:hover { background: #2ea043; }
        .task-list { margin-top: 12px; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #21262d; border-radius: 6px; margin-bottom: 6px; }
        .task-item .id { font-family: monospace; font-size: 12px; color: #8b949e; }
        .task-item .target { font-weight: 500; }
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; }
        .badge-pending { background: #6e7681; color: white; }
        .badge-running { background: #1f6feb; color: white; }
        .badge-completed { background: #238636; color: white; }
        .badge-failed { background: #da3633; color: white; }
        .graph-container { display: flex; flex-direction: column; gap: 12px; }
        .graph-node { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #21262d; border: 2px solid #30363d; border-radius: 8px; transition: all 0.3s; }
        .graph-node.pending { border-color: #6e7681; }
        .graph-node.running { border-color: #1f6feb; animation: pulse 1.5s infinite; }
        .graph-node.success { border-color: #238636; }
        .graph-node.failed { border-color: #da3633; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(31, 111, 235, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(31, 111, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(31, 111, 235, 0); } }
        .node-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .node-icon.pending { background: #6e7681; }
        .node-icon.running { background: #1f6feb; }
        .node-icon.success { background: #238636; }
        .node-icon.failed { background: #da3633; }
        .node-info { flex: 1; }
        .node-name { font-weight: 600; }
        .node-meta { font-size: 12px; color: #8b949e; margin-top: 2px; }
        .connection-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.connected { background: #3fb950; }
        .dot.disconnected { background: #f85149; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Eino-PTES 渗透测试指挥系统 v0.0.1</h1>
        <div class="connection-status">
            <span class="dot disconnected" id="connDot"></span>
            <span id="connText">未连接</span>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <div class="panel">
                <h2>工作节点</h2>
                <div id="workers"></div>
            </div>
        </div>
        <div class="main">
            <div class="panel">
                <h2>新建任务</h2>
                <div class="task-form">
                    <select id="taskType">
                        <option value="reconnaissance">信息收集</option>
                        <option value="vulnerability_scan">漏洞扫描</option>
                    </select>
                    <input type="text" id="taskTarget" placeholder="目标地址 (如 192.168.1.1)" style="flex:1;min-width:200px;">
                    <button onclick="createTask()">执行任务</button>
                </div>
            </div>
            <div class="panel">
                <h2>任务列表</h2>
                <div class="task-list" id="tasks"></div>
            </div>
            <div class="panel">
                <h2>执行图谱</h2>
                <div class="graph-container" id="graph"></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://' + location.host + '/ws');
        let workers = [];
        let tasks = [];
        let graphState = {};

        ws.onopen = () => {
            document.getElementById('connDot').className = 'dot connected';
            document.getElementById('connText').textContent = '已连接';
            fetchWorkers();
            fetchTasks();
        };

        ws.onclose = () => {
            document.getElementById('connDot').className = 'dot disconnected';
            document.getElementById('connText').textContent = '已断开';
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.node_name) {
                updateGraphNode(data);
            }
        };

        function fetchWorkers() {
            fetch('/api/workers').then(r => r.json()).then(data => {
                workers = data;
                renderWorkers();
            });
        }

        function fetchTasks() {
            fetch('/api/tasks').then(r => r.json()).then(data => {
                tasks = data;
                renderTasks();
            });
        }

        function renderWorkers() {
            const el = document.getElementById('workers');
            if (!workers.length) {
                el.innerHTML = '<div style="color:#8b949e;font-size:12px;">暂无工作节点</div>';
                return;
            }
            el.innerHTML = workers.map(w => {
                const statusClass = w.status === 'idle' ? 'status-idle' : w.status === 'busy' ? 'status-busy' : 'status-offline';
                const caps = w.capabilities ? w.capabilities.join(', ') : '';
                return `<div class="worker-card">
                    <div class="name">${w.name || w.id}</div>
                    <div class="status ${statusClass}">状态: ${w.status} | 能力: ${caps}</div>
                    ${w.current_task ? `<div style="font-size:11px;color:#8b949e;margin-top:4px;">任务: ${w.current_task}</div>` : ''}
                </div>`;
            }).join('');
        }

        function renderTasks() {
            const el = document.getElementById('tasks');
            if (!tasks.length) {
                el.innerHTML = '<div style="color:#8b949e;font-size:12px;">暂无任务</div>';
                return;
            }
            el.innerHTML = tasks.map(t => {
                const badgeClass = t.status === 'pending' ? 'badge-pending' : t.status === 'running' ? 'badge-running' : t.status === 'completed' ? 'badge-completed' : 'badge-failed';
                return `<div class="task-item">
                    <div>
                        <div class="target">${t.type} → ${t.target}</div>
                        <div class="id">${t.id} | worker: ${t.worker_id || '未分配'}</div>
                    </div>
                    <span class="badge ${badgeClass}">${t.status}</span>
                </div>`;
            }).join('');
        }

        function updateGraphNode(update) {
            if (!graphState[update.task_id]) {
                graphState[update.task_id] = { nodes: {} };
            }
            graphState[update.task_id].nodes[update.node_name] = update;
            renderGraph();
        }

        function renderGraph() {
            const el = document.getElementById('graph');
            let html = '';
            for (const taskId in graphState) {
                const gs = graphState[taskId];
                for (const nodeName in gs.nodes) {
                    const node = gs.nodes[nodeName];
                    const state = node.state || 'pending';
                    html += `<div class="graph-node ${state}">
                        <div class="node-icon ${state}">${state === 'success' ? '✓' : state === 'failed' ? '✗' : state === 'running' ? '◉' : '○'}</div>
                        <div class="node-info">
                            <div class="node-name">${nodeName || '任务节点'}</div>
                            <div class="node-meta">${taskId} | ${state}</div>
                        </div>
                    </div>`;
                }
            }
            if (!html) {
                html = '<div style="color:#8b949e;font-size:12px;">等待任务执行...</div>';
            }
            el.innerHTML = html;
        }

        function createTask() {
            const type = document.getElementById('taskType').value;
            const target = document.getElementById('taskTarget').value;
            if (!target) return alert('请输入目标地址');

            fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, target })
            }).then(r => r.json()).then(data => {
                document.getElementById('taskTarget').value = '';
                fetchTasks();
                updateGraphNode({ task_id: data.id, node_name: data.type, state: 'pending' });
            });
        }

        setInterval(() => {
            fetchWorkers();
            fetchTasks();
        }, 3000);

        renderGraph();
    </script>
</body>
</html>
